<!DOCTYPE html>

<html>
    <head>
        <title>My buttons</title>
    </head>
    <body>
        <button onclick="doSomething()" style="background-color: aqua; color:red; border-radius: 5px">
            <b>click me</b>
        </button>
        <p id="test">Hello!</p>
        <script>
            function doSomething(){
                document.getElementById("test").innerHTML = "Goodbye";
            }
        </script>
    </body>
</html>
