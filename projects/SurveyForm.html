<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <h1 id="title">Survey Form</h1>
    <p id="description">Short explanation</p>
    <form id="survey-form">
      <label id="name-label">Name:</label>
      <input required id="name" type="text" placeholder="Write your name">
      <br>
      <label id="email-label">Email:</label>
      <input required id="email" type="email" placeholder="Write your email">
      <br>
      <label id="number-label">Number:</label>
      <input id="number" type="number" min="1" max="99" placeholder="+51">
      <br>
      <select id="dropdown">
        <option>Option 1</option>
        <option>Option 2</option>
      </select>
      <br>
      <input type="radio" name="radio" value="radio">Yes</input>
      <input type="radio" name="radio" value="radio">No</input>
      <br>
      <input type="checkbox" value="check">Maybe</input>
      <input type="checkbox" value="check">I don't know</input>
      <input type="checkbox" value="check">Forget about it</input>
      <br>
      <label>Aditional comments:</label>
      <br>
      <textarea></textarea>
      <br>
      <button id="submit">Submit</button>
    </form>
  </body>
</html>
